<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>Импорт — Метал Воркинг Центр</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand: #1565c0; --brand-dark: #0d47a1;
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
  --gray-400: #9ca3af; --gray-600: #4b5563; --gray-900: #111827;
  --green: #059669; --amber: #d97706; --blue: #2563eb; --red: #dc2626;
}
body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background: var(--gray-50); color: var(--gray-900); padding-bottom: 90px; -webkit-font-smoothing: antialiased; }

/* Header */
.hdr {
  background: linear-gradient(135deg, #0d47a1 0%, #1565c0 100%);
  color: #fff; padding: 18px 20px 16px;
  border-radius: 0 0 20px 20px;
  box-shadow: 0 4px 12px rgba(13,71,161,0.18);
}
.hdr-top { display: flex; align-items: center; gap: 12px; }
.hdr-back { font-size: 22px; color: #fff; text-decoration: none; padding: 4px 8px; }
.hdr-title { font-size: 17px; font-weight: 700; flex: 1; }
.hdr-sub { font-size: 11px; opacity: 0.85; margin-top: 3px; }

/* Summary row */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; padding: 14px 16px 0; }
.st { background: #fff; border-radius: 12px; padding: 10px 6px; text-align: center; border: 1px solid var(--gray-200); }
.st-v { font-size: 20px; font-weight: 900; }
.st-l { font-size: 9px; color: var(--gray-400); font-weight: 600; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Chips */
.chips { display: flex; gap: 6px; overflow-x: auto; padding: 0 0 10px; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 7px 13px;
  border: 1.5px solid var(--gray-200); border-radius: 20px;
  background: #fff; font-size: 11.5px; font-weight: 600;
  color: var(--gray-600); cursor: pointer; white-space: nowrap;
}
.chip.on { background: var(--brand-dark); border-color: var(--brand-dark); color: #fff; }
.chip .cnt { display: inline-block; margin-left: 4px; padding: 1px 5px; background: rgba(0,0,0,0.07); border-radius: 8px; font-size: 9px; }
.chip.on .cnt { background: rgba(255,255,255,0.2); }

.sec { padding: 16px 16px 0; }
.sec-lbl { font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; }

/* Card */
.card {
  background: #fff; border-radius: 14px;
  padding: 14px 16px; margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05); border: 1px solid var(--gray-200);
  border-left: 4px solid var(--brand);
  text-decoration: none; color: inherit; display: block;
}
.card.s-delivered { border-left-color: var(--green); }
.card.s-transit { border-left-color: var(--blue); }
.card.s-preparing { border-left-color: var(--amber); }

.c-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.c-supplier { font-size: 14px; font-weight: 700; }
.c-code { font-size: 10px; color: var(--gray-400); font-family: monospace; margin-top: 2px; }
.c-desc { font-size: 11.5px; color: var(--gray-600); margin-top: 3px; line-height: 1.4; }
.c-cost { font-size: 13px; font-weight: 700; color: var(--brand-dark); white-space: nowrap; }

/* Status + badge row */
.badge {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 3px 9px; border-radius: 10px;
}
.badge.transit { background: #dbeafe; color: #1e40af; }
.badge.preparing { background: #fef3c7; color: #92400e; }
.badge.delivered { background: #d1fae5; color: #065f46; }
.badge.sample { background: #ede9fe; color: #5b21b6; }

/* Pipeline */
.pipe { display: flex; gap: 4px; margin: 10px 0 4px; }
.pipe-s { flex: 1; height: 4px; background: var(--gray-200); border-radius: 2px; }
.pipe-s.done { background: var(--green); }
.pipe-s.now { background: var(--amber); animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.5 } }
.pipe-lbl { display: flex; justify-content: space-between; font-size: 8px; color: var(--gray-400); margin-bottom: 6px; }

/* Payment bar */
.pay-bar-wrap { margin-top: 8px; }
.pay-bar-bg { height: 6px; background: var(--gray-200); border-radius: 3px; overflow: hidden; }
.pay-bar-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width 0.3s; }
.pay-bar-fill.partial { background: var(--amber); }
.pay-bar-fill.zero { background: var(--gray-200); }
.pay-info { display: flex; justify-content: space-between; font-size: 10px; color: var(--gray-400); margin-top: 3px; }
.pay-info .paid { color: var(--green); font-weight: 600; }
.pay-info .unpaid { color: var(--red); font-weight: 600; }

/* Meta row */
.c-meta {
  display: flex; gap: 8px; flex-wrap: wrap;
  font-size: 10px; color: var(--gray-400);
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid var(--gray-100);
}
.c-meta span { white-space: nowrap; }

/* Activity log */
.log-btn {
  font-size: 10px; color: var(--brand); font-weight: 600;
  cursor: pointer; margin-top: 8px; padding-top: 6px;
  border-top: 1px solid var(--gray-100);
}
.log { display: none; margin-top: 6px; }
.log.open { display: block; }
.log-row { display: flex; gap: 8px; font-size: 10px; padding: 3px 0; color: var(--gray-600); }
.log-dt { font-weight: 700; color: var(--gray-400); flex-shrink: 0; width: 44px; }
.log-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--brand); margin-top: 5px; flex-shrink: 0; }

.empty { text-align: center; color: var(--gray-400); padding: 40px 20px; font-size: 13px; }

/* Cost summary pill */
.cost-summary {
  display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px;
}
.cost-pill {
  font-size: 9px; padding: 2px 7px; border-radius: 6px;
  background: var(--gray-100); color: var(--gray-600); font-weight: 600;
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <a class="hdr-back" href="/dashboard">‹</a>
    <div style="flex:1">
      <div class="hdr-title">Импорт</div>
      <div class="hdr-sub">Ачилт, зардал, агуулахын төлөв</div>
    </div>
    <a href="/imports/new" style="background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:700;padding:8px 14px;border-radius:10px;text-decoration:none;white-space:nowrap">+ Шинэ</a>
  </div>
  <a href="/imports/cost-analysis" style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;background:rgba(255,255,255,.16);color:#fff;font-size:12.5px;font-weight:700;padding:10px;border-radius:12px;text-decoration:none">📊 Өртгийн шинжилгээ (Cost Analysis)</a>
</div>

<div class="stats" id="stats"></div>

<div class="sec">
  <div class="chips" id="chips"></div>
  <div id="list"></div>
</div>

<script src="/js/bottom-nav.js"></script>
<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = '/';

async function api(path) {
  const r = await fetch('/api/import' + path, { headers: { 'Authorization': 'Bearer ' + token }});
  if (r.status === 401) { localStorage.clear(); window.location.href = '/'; }
  return r.json();
}

const STATUS = {
  in_transit_cn: { label: '🚚 Хятадаас замд', cls: 'transit', group: 'transit' },
  at_border:     { label: '🏛 Хилд ирсэн', cls: 'transit', group: 'transit' },
  customs:       { label: '🏛 Гаальд', cls: 'transit', group: 'transit' },
  in_transit_mn: { label: '🚚 МН руу замд', cls: 'transit', group: 'transit' },
  preparing:     { label: '🏭 Бэлтгэгдэж байна', cls: 'preparing', group: 'preparing' },
  delivered:     { label: '✅ Хүргэгдсэн', cls: 'delivered', group: 'delivered' },
};
const STAGES = ['preparing','in_transit_cn','at_border','customs','in_transit_mn','delivered'];
function pipeSteps(status) {
  const idx = STAGES.indexOf(status);
  return STAGES.map((_, i) => {
    if (idx < 0) return '';
    if (i < idx) return 'done';
    if (i === idx) return status === 'delivered' ? 'done' : 'now';
    return '';
  });
}

function fmt(n) {
  if (!n) return '0₮';
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'') + 'сая₮';
  return n.toLocaleString() + '₮';
}

let all = [];
let filter = 'all';

function setFilter(k) {
  filter = k;
  document.querySelectorAll('.chip').forEach(el => el.classList.toggle('on', el.dataset.f === k));
  renderList();
}

function renderStats(d) {
  document.getElementById('stats').innerHTML = `
    <div class="st"><div class="st-v" style="color:var(--blue)">${d.in_transit}</div><div class="st-l">Замд</div></div>
    <div class="st"><div class="st-v" style="color:var(--amber)">${d.manufacturing}</div><div class="st-l">Бэлтгэл</div></div>
    <div class="st"><div class="st-v" style="color:var(--green)">${d.delivered}</div><div class="st-l">Ирсэн</div></div>
    <div class="st"><div class="st-v" style="color:${d.unpaid_count?'var(--red)':'var(--gray-400)'}">${d.unpaid_count}</div><div class="st-l">Төлөөгүй</div></div>
  `;
}

function renderChips() {
  const counts = { all: all.length };
  for (const s of all) {
    const g = (STATUS[s.status]||{}).group || s.status;
    counts[g] = (counts[g]||0) + 1;
  }
  const defs = [
    { key:'all', label:'Бүгд' },
    { key:'transit', label:'🚚 Замд' },
    { key:'preparing', label:'🏭 Бэлтгэл' },
    { key:'delivered', label:'✅ Ирсэн' },
  ].filter(c => counts[c.key] > 0 || c.key === 'all');

  document.getElementById('chips').innerHTML = defs.map(c =>
    `<button class="chip ${c.key===filter?'on':''}" data-f="${c.key}" onclick="setFilter('${c.key}')">
      ${c.label} <span class="cnt">${counts[c.key]||0}</span>
    </button>`
  ).join('');
}

function renderList() {
  let items = all;
  if (filter !== 'all') items = items.filter(s => (STATUS[s.status]||{}).group === filter);

  const el = document.getElementById('list');
  if (!items.length) { el.innerHTML = '<div class="empty">Тохирох ачилт байхгүй</div>'; return; }

  el.innerHTML = items.map(s => {
    const st = STATUS[s.status] || { label: s.status, cls: 'transit', group: 'transit' };
    const steps = pipeSteps(s.status);
    const isSample = s.code.endsWith('-S');
    const payPct = s.payment_pct || 0;
    const payClass = payPct >= 100 ? '' : payPct > 0 ? 'partial' : 'zero';
    const logs = s.activity_log || [];

    return `<a class="card s-${st.cls}" href="/imports/shipment/${s.code}">
      <div class="c-top">
        <div style="flex:1;min-width:0">
          <div class="c-supplier">${s.supplier_name || s.project_name}</div>
          <div class="c-code">${s.code}</div>
          <div class="c-desc">${s.description}</div>
        </div>
        <div class="c-cost">${s.total_cost_mnt ? fmt(s.total_cost_mnt) : '—'}</div>
      </div>

      <div class="pipe">
        ${steps.map(c => `<div class="pipe-s ${c}"></div>`).join('')}
      </div>
      <div class="pipe-lbl">
        <span>Бэлтгэл</span><span>Ачилт</span><span>Хил</span><span>Гааль</span><span>Тээвэр</span><span>Ирсэн</span>
      </div>

      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span class="badge ${st.cls}">${st.label}</span>
        ${isSample ? '<span class="badge sample">🧪 Загвар</span>' : ''}
        ${s.lot_count ? `<span style="font-size:10px;color:var(--gray-400)">${s.lot_count} lot</span>` : ''}
      </div>

      ${s.total_cost_mnt > 0 ? `
      <div class="pay-bar-wrap">
        <div class="pay-bar-bg"><div class="pay-bar-fill ${payClass}" style="width:${Math.min(payPct,100)}%"></div></div>
        <div class="pay-info">
          <span class="paid">✅ ${fmt(s.total_paid_mnt)}</span>
          ${payPct < 100 ? `<span class="unpaid">⏳ ${fmt(s.total_cost_mnt - s.total_paid_mnt)}</span>` : ''}
          <span>${payPct}%</span>
        </div>
      </div>` : ''}

      <div class="c-meta">
        ${s.shipped_at ? `<span>📦 Ачсан: ${s.shipped_at.slice(5)}</span>` : ''}
        ${s.delivered_at ? `<span>🏁 Ирсэн: ${s.delivered_at.slice(5)}</span>` : ''}
        ${s.freight_method ? `<span>🚛 ${({truck:'Машин',cargo:'Карго',post:'Шуудан'})[s.freight_method]||s.freight_method}</span>` : ''}
        ${s.total_weight_kg ? `<span>⚖️ ${(s.total_weight_kg/1000).toFixed(1)}т</span>` : ''}
      </div>

      ${s.notes ? `<div style="margin-top:6px;font-size:10px;color:var(--gray-600);line-height:1.4">📝 ${s.notes}</div>` : ''}

      ${logs.length ? `
        <div class="log-btn" onclick="event.preventDefault();toggleLog(this)">📋 Түүх (${logs.length}) ›</div>
        <div class="log">
          ${logs.slice().reverse().map(l => `
            <div class="log-row">
              <span class="log-dt">${l.date.slice(5)}</span>
              <span class="log-dot"></span>
              <span>${l.event}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </a>`;
  }).join('');
}

function toggleLog(el) {
  const log = el.nextElementSibling;
  log.classList.toggle('open');
  el.textContent = log.classList.contains('open')
    ? '📋 Түүх ↑ Хаах'
    : `📋 Түүх (${log.children.length}) ›`;
}

async function load() {
  const [dashboard, shipments] = await Promise.all([
    api('/dashboard'),
    api('/shipments')
  ]);
  renderStats(dashboard);
  all = shipments;
  renderChips();
  renderList();
}
load();
</script>
</body>
</html>
