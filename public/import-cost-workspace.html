<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>Cost Workspace — Метал Воркинг Центр</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand: #1565c0; --brand-dark: #0d47a1;
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
  --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151; --gray-900: #111827;
  --green: #059669; --green-bg: #d1fae5; --amber: #d97706; --amber-bg:#fef3c7; --blue: #2563eb; --red: #dc2626; --purple: #7c3aed;
}
body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background: var(--gray-50); color: var(--gray-900); padding-bottom: 90px; -webkit-font-smoothing: antialiased; }

.hdr { background: linear-gradient(135deg, #0d47a1 0%, #1565c0 100%); color: #fff; padding: 18px 20px 16px; border-radius: 0 0 20px 20px; box-shadow: 0 4px 12px rgba(13,71,161,0.18); }
.hdr-top { display: flex; align-items: center; gap: 12px; }
.hdr-back { font-size: 22px; color: #fff; text-decoration: none; padding: 4px 8px; }
.hdr-title { font-size: 17px; font-weight: 800; flex: 1; line-height:1.25; }
.hdr-sub { font-size: 11px; opacity: 0.85; margin-top: 3px; }

.sec { padding: 14px 14px 0; }
.sec-h { font-size: 12px; font-weight: 800; color: var(--gray-600); text-transform: uppercase; letter-spacing: .5px; margin: 4px 2px 8px; }

.card { background:#fff; border-radius:14px; padding:14px 16px; margin-bottom:12px; box-shadow:0 1px 5px rgba(0,0,0,0.05); border:1px solid var(--gray-200); }

/* reconciliation */
.recon { display:flex; gap:8px; }
.recon .box { flex:1; background:#fff; border:1px solid var(--gray-200); border-radius:13px; padding:11px 10px; text-align:center; }
.recon .lbl { font-size:9.5px; color:var(--gray-500); font-weight:700; text-transform:uppercase; letter-spacing:.3px; }
.recon .val { font-size:14px; font-weight:900; margin-top:4px; }
.recon .box.ledger .val { color:var(--brand-dark); }
.recon .box.alloc .val { color:var(--purple); }
.recon .box.diff.zero { border-color:var(--green-bg); background:#f0fdf4; }
.recon .box.diff.zero .val { color:var(--green); }
.recon .box.diff.warn { border-color:#fde68a; background:#fffbeb; }
.recon .box.diff.warn .val { color:var(--amber); }
.diff-note { font-size:10.5px; color:var(--gray-500); margin-top:8px; line-height:1.5; padding:0 2px; }
.diff-note.warn { color:#92400e; }

/* cost rows */
.crow { display:flex; align-items:flex-start; gap:9px; padding:10px 0; border-top:1px solid var(--gray-100); }
.crow:first-child { border-top:none; }
.tag { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:3px; }
.tag.capitalize { background:var(--green); }
.tag.period { background:var(--gray-400); }
.crow-l { flex:1; min-width:0; }
.crow-type { font-size:13px; font-weight:700; }
.crow-note { font-size:10.5px; color:var(--gray-500); margin-top:2px; line-height:1.35; }
.crow-pay { font-size:9.5px; color:var(--blue); margin-top:3px; }
.crow-amt { font-size:13.5px; font-weight:800; color:var(--gray-900); white-space:nowrap; }
.csub { display:flex; justify-content:space-between; font-size:11px; padding:9px 0 0; margin-top:6px; border-top:2px solid var(--gray-200); }
.csub .g { color:var(--green); font-weight:700; } .csub .p { color:var(--gray-500); font-weight:700; }

/* line items (dual unit) */
.ltable { width:100%; border-collapse:collapse; }
.ltable thead th { font-size:9px; color:var(--gray-400); font-weight:700; text-transform:uppercase; letter-spacing:.3px; text-align:right; padding:6px 6px; border-bottom:1px solid var(--gray-200); }
.ltable thead th.l { text-align:left; }
.ltable tbody td { padding:9px 6px; border-bottom:1px solid var(--gray-100); font-size:12px; text-align:right; vertical-align:top; }
.ltable tbody td.l { text-align:left; }
.ltable tbody tr:last-child td { border-bottom:none; }
.l-name { font-weight:700; font-size:12.5px; }
.l-spec { font-size:9.5px; color:var(--gray-400); font-family:monospace; margin-top:1px; }
.l-buy { color:var(--gray-600); white-space:nowrap; }
.l-arrow { color:var(--gray-300); font-size:10px; }
.l-stock { color:var(--brand-dark); font-weight:700; white-space:nowrap; }
.l-unit { font-weight:900; color:var(--purple); white-space:nowrap; }
.l-unit-sub { font-size:8.5px; color:var(--gray-400); font-weight:600; }
.l-total { font-weight:700; color:var(--brand-dark); white-space:nowrap; }
.ltable tfoot td { padding:10px 6px; font-size:12.5px; font-weight:800; border-top:2px solid var(--gray-200); text-align:right; }
.ltable tfoot td.l { text-align:left; color:var(--gray-500); font-size:10.5px; text-transform:uppercase; letter-spacing:.3px; }
.basis { font-size:10px; color:var(--gray-500); margin:8px 2px 0; }
.basis b { color:var(--gray-700); }

/* payments */
.pay { display:flex; align-items:flex-start; gap:8px; padding:9px 0; border-top:1px solid var(--gray-100); }
.pay:first-child { border-top:none; }
.pay.final { background:linear-gradient(90deg,#ecfdf5,transparent); border-radius:8px; padding:9px 8px; }
.pay-l { flex:1; min-width:0; }
.pay-row1 { display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
.pay-amt { font-size:13px; font-weight:800; }
.pay-date { font-size:10px; color:var(--gray-500); }
.acct { font-size:9px; font-weight:700; padding:2px 6px; border-radius:6px; background:#dbeafe; color:#1e40af; }
.acct.kass { background:var(--amber-bg); color:#92400e; }
.final-tag { font-size:9px; font-weight:800; color:#065f46; }
.pay-memo { font-size:10px; color:var(--gray-500); margin-top:3px; line-height:1.35; }

.empty { text-align:center; color:var(--gray-400); padding:40px 20px; font-size:13px; line-height:1.6; }
.note { font-size:10px; color:var(--gray-400); text-align:center; padding:6px 16px 0; line-height:1.5; }

/* ── editing controls ── */
.btn { border:none; border-radius:10px; font-size:13px; font-weight:700; padding:10px 14px; cursor:pointer; font-family:inherit; }
.btn-primary { background:var(--brand); color:#fff; }
.btn-ok { background:var(--green); color:#fff; }
.btn-ghost { background:var(--gray-100); color:var(--gray-600); }
.editstart { text-align:center; }
.es-txt { font-size:11.5px; color:var(--gray-500); line-height:1.5; margin-bottom:12px; }
.editbar .eb-top { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.editbar .eb-basis { margin-top:12px; display:flex; align-items:center; gap:10px; justify-content:space-between; }
.eb-lbl { font-size:11px; color:var(--gray-500); font-weight:700; }
.chips { display:flex; gap:6px; }
.chip { border:1px solid var(--gray-200); background:#fff; color:var(--gray-600); border-radius:9px; padding:6px 13px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
.chip.on { background:var(--brand); color:#fff; border-color:var(--brand); }
.chip:disabled { opacity:.45; cursor:default; }
.badge { font-size:11px; font-weight:800; padding:5px 11px; border-radius:8px; }
.badge.draft { background:var(--amber-bg); color:#92400e; }
.badge.fin { background:var(--green-bg); color:#065f46; }
.card-add { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.card-add .ca-t { font-size:11px; font-weight:800; color:var(--gray-500); text-transform:uppercase; letter-spacing:.3px; }
.btn-add { background:var(--brand); color:#fff; border:none; border-radius:8px; font-size:12px; font-weight:700; padding:6px 11px; cursor:pointer; font-family:inherit; }
.l-name-row { display:flex; align-items:center; gap:6px; }
.l-name.tap { cursor:pointer; border-bottom:1px dashed var(--gray-300); }
.crow-type.tap { cursor:pointer; }
.x { border:none; background:none; color:var(--red); font-size:14px; font-weight:800; cursor:pointer; padding:2px 5px; line-height:1; flex-shrink:0; }

/* ── bottom sheet (add/edit form) ── */
.sheet-bg { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:none; align-items:flex-end; z-index:50; }
.sheet-bg.on { display:flex; }
.sheet { background:#fff; width:100%; border-radius:18px 18px 0 0; padding:18px 16px calc(16px + env(safe-area-inset-bottom)); max-height:90vh; overflow-y:auto; }
.sheet-h { font-size:15px; font-weight:800; margin-bottom:14px; }
.fld { display:block; margin-bottom:12px; }
.fld-l { display:block; font-size:11px; font-weight:700; color:var(--gray-600); margin-bottom:5px; }
.fld-h { display:block; font-size:9.5px; color:var(--gray-400); margin-top:3px; }
.in { width:100%; border:1px solid var(--gray-300); border-radius:10px; padding:10px 11px; font-size:14px; font-family:inherit; background:#fff; color:var(--gray-900); }
.frow { display:flex; gap:10px; } .frow .fld { flex:1; }
.seg { display:flex; gap:6px; }
.seg-b { flex:1; border:1px solid var(--gray-300); background:#fff; color:var(--gray-600); border-radius:9px; padding:9px 6px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
.seg-b.on { background:var(--brand); color:#fff; border-color:var(--brand); }
.sheet-foot { display:flex; gap:10px; margin-top:6px; }
.sheet-foot .btn { flex:1; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <a class="hdr-back" id="backLink" href="/imports/orders">‹</a>
    <div style="flex:1">
      <div class="hdr-title" id="hdrTitle">Cost Workspace</div>
      <div class="hdr-sub" id="hdrSub">Барааны эцсийн өртөг — складад орсон</div>
    </div>
  </div>
</div>

<div id="body"></div>

<div class="sheet-bg" id="sheet" onclick="if(event.target===this)closeSheet()">
  <div class="sheet">
    <div class="sheet-h" id="sheetTitle"></div>
    <div id="sheetBody"></div>
    <div class="sheet-foot">
      <button class="btn btn-ghost" onclick="closeSheet()">Болих</button>
      <button class="btn btn-primary" id="sheetSave">Хадгалах</button>
    </div>
  </div>
</div>

<script src="/js/bottom-nav.js"></script>
<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = '/';

const params = new URLSearchParams(location.search);
const orderId = params.get('order');
const orderName = params.get('name');
if (orderName) document.getElementById('hdrTitle').textContent = orderName;

async function api(path) {
  const r = await fetch('/api/import' + path, { headers: { 'Authorization': 'Bearer ' + token }});
  if (r.status === 401) { localStorage.clear(); window.location.href = '/'; }
  return r.json();
}

function fmt(n) { if (!n) return '0₮'; return Math.round(n).toLocaleString() + '₮'; }
function fmtShort(n) { if (!n) return '0₮'; if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'') + 'сая₮'; return Math.round(n).toLocaleString() + '₮'; }
const UNIT_MN = { meter:'метр', kg:'кг', ton:'тонн', m2:'м²', piece:'ш', set:'иж', bundle:'багц', stick:'ш', roll:'ороомог' };
function unitMn(u) { return UNIT_MN[u] || u || ''; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

const TYPE_MN = {
  product:'Бараа', product_adjustment:'Барааны тохируулга',
  freight_border_to_ub:'Тээвэр (хил→УБ)', freight:'Тээвэр',
  customs:'Гааль', customs_duty:'Гаалийн татвар', duty:'Татвар',
  vat:'НӨАТ', tax:'Татвар', bank_fee:'Банкны шимтгэл', fx_loss:'Валютын зөрүү', agent_fee:'Агентын хөлс'
};
function typeMn(t){ return TYPE_MN[t] || TYPE_MN[(t||'').replace(/_.*/,'')] || t || 'Зардал'; }
function acctShort(label){ return /хаан|khan|касс/i.test(label||'') ? 'Касс' : 'TDB'; }
function acctClass(label){ return /хаан|khan|касс/i.test(label||'') ? 'kass' : ''; }

function renderRecon(d) {
  const diff = d.difference_mnt || 0;
  const zero = Math.abs(diff) < 1;
  const note = zero
    ? '✅ Бүртгэгдсэн зардал бүрэн хуваарилагдсан.'
    : `⚠️ ${fmt(Math.abs(diff))} зөрүү байна${diff>0?' (хуваарилагдаагүй үлдсэн)':' (хэт хуваарилсан)'}. Энэ нь Finalize-ийг блоклохгүй — мэдээлэл.`;
  return `<div class="recon">
    <div class="box ledger"><div class="lbl">Нийт зардал</div><div class="val">${fmtShort(d.ledger_total_mnt)}</div></div>
    <div class="box alloc"><div class="lbl">Хуваарилсан</div><div class="val">${fmtShort(d.allocated_total_mnt)}</div></div>
    <div class="box diff ${zero?'zero':'warn'}"><div class="lbl">Зөрүү</div><div class="val">${fmtShort(diff)}</div></div>
  </div>
  <div class="diff-note ${zero?'':'warn'}">${note}</div>`;
}

function lineName(d, id) { const l = (d.lines||[]).find(x => (x.line_id||x.lot_id) === id); return l ? l.name : '—'; }

function renderCosts(d) {
  const ed = d.editable && d.status === 'draft';
  const addBtn = ed ? `<div class="card-add"><span class="ca-t">Зардал</span><button class="btn-add" onclick="openCostSheet(null)">+ Нэмэх</button></div>` : '';
  if (!d.costs.length) return `<div class="card">${addBtn}<div class="empty">Зардал бүртгэгдээгүй.</div></div>`;
  const rows = d.costs.map(c => {
    const typeCell = ed
      ? `<div class="crow-type tap" onclick="openCostSheet('${c.id}')">${esc(typeMn(c.type))}</div>`
      : `<div class="crow-type">${esc(typeMn(c.type))}</div>`;
    const scopeTag = (c.scope === 'direct' && c.line_id) ? `<div class="crow-pay">🎯 ${esc(lineName(d, c.line_id))}</div>` : '';
    return `<div class="crow">
    <span class="tag ${c.tag}" title="${c.tag==='capitalize'?'Бараанд шингэнэ':'Ерөнхий зардал'}"></span>
    <div class="crow-l">
      ${typeCell}
      ${c.note?`<div class="crow-note">${esc(c.note)}</div>`:''}
      ${scopeTag}
      ${c.payment?`<div class="crow-pay">💳 ${esc(c.payment.date||'')} · ${esc(acctShort(c.payment.account_label))}${c.payment.memo?' · '+esc(c.payment.memo):''}</div>`:''}
    </div>
    <div class="crow-amt">${fmt(c.amount_mnt)}</div>
    ${ed?`<button class="x" onclick="delCost('${c.id}')">✕</button>`:''}
  </div>`;
  }).join('');
  return `<div class="card">${addBtn}${rows}
    <div class="csub"><span class="g">🟢 Бараанд: ${fmt(d.capitalize_total_mnt)}</span><span class="p">⚪ Ерөнхий: ${fmt(d.period_total_mnt)}</span></div>
  </div>`;
}

function renderEditBar(d) {
  if (!d.materialized) {
    return `<div class="card editstart">
      <div class="es-txt">Энэ барааны өртгийг гараар засварлаж болно. Эхлэхэд одоогийн склад/зардлын мэдээллээс ноорог үүснэ — <b>склад хөндөгдөхгүй</b>.</div>
      <button class="btn btn-primary" onclick="doMaterialize()">✏️ Засварлаж эхлэх</button>
    </div>`;
  }
  const fin = d.status === 'finalized';
  const badge = fin ? '<span class="badge fin">✓ Баталгаажсан</span>' : '<span class="badge draft">✎ Ноорог</span>';
  const action = fin
    ? `<button class="btn btn-ghost" onclick="doReopen()">Дахин нээх</button>`
    : `<button class="btn btn-ok" onclick="doFinalize()">Баталгаажуулах ✓</button>`;
  const chips = ['weight','value','qty'].map(b => {
    const lbl = b==='weight'?'Жин':b==='value'?'Үнэ':'Тоо';
    return `<button class="chip${d.basis===b?' on':''}"${fin?' disabled':''} onclick="setBasis('${b}')">${lbl}</button>`;
  }).join('');
  return `<div class="card editbar">
    <div class="eb-top">${badge}${action}</div>
    <div class="eb-basis"><span class="eb-lbl">Хуваарилах суурь</span><div class="chips">${chips}</div></div>
  </div>`;
}

function renderLines(d) {
  const ed = d.editable && d.status === 'draft';
  const addBtn = ed ? `<div class="card-add"><span class="ca-t">Нэр төрөл</span><button class="btn-add" onclick="openLineSheet(null)">+ Нэмэх</button></div>` : '';
  if (!d.lines.length) {
    const msg = ed
      ? '<div class="empty">Нэр төрөл алга.<br><span style="font-size:11px">Дээрх “+ Нэмэх” товчоор бараагаа задлан бичнэ үү.</span></div>'
      : '<div class="empty">Энэ бараанд нэр төрөл хараахан бүртгэгдээгүй.<br><span style="font-size:11px">Cost Workspace-д нэр төрөл нэмэх нь дараагийн алхам.</span></div>';
    return `<div class="card">${addBtn}${msg}</div>`;
  }
  const body = d.lines.map(l => {
    const lid = l.line_id || l.lot_id;
    const buy = `${(l.buy_qty||0).toLocaleString()} ${unitMn(l.buy_unit)}`;
    const stock = `${(l.stock_qty||0).toLocaleString()} ${unitMn(l.stock_unit)}`;
    const dualBuy = l.same_unit ? '' : `<span class="l-buy">${buy}</span> <span class="l-arrow">→</span> `;
    const nameCell = ed
      ? `<div class="l-name-row"><span class="l-name tap" onclick="openLineSheet('${lid}')">${esc(l.name)}</span><button class="x" onclick="delLine('${lid}')">✕</button></div>`
      : `<div class="l-name">${esc(l.name)}</div>`;
    return `<tr>
      <td class="l">${nameCell}${l.spec?`<div class="l-spec">${esc(l.spec)}</div>`:''}</td>
      <td>${dualBuy}<span class="l-stock">${stock}</span></td>
      <td><span class="l-unit">${fmt(l.unit_cost_stock)}</span><div class="l-unit-sub">₮/${unitMn(l.stock_unit)}</div></td>
      <td><span class="l-total">${fmtShort(l.allocated_mnt)}</span></td>
    </tr>`;
  }).join('');
  const basis = d.basis || d.basis_hint;
  return `<div class="card" style="padding:10px 12px">
    ${addBtn}
    <table class="ltable">
      <thead><tr><th class="l">Нэр төрөл</th><th>Худ.авсан → Складын</th><th>Нэгж өртөг</th><th>Нийт</th></tr></thead>
      <tbody>${body}</tbody>
      <tfoot><tr><td class="l">Нийт хуваарилсан</td><td></td><td></td><td><span class="l-total">${fmtShort(d.allocated_total_mnt)}</span></td></tr></tfoot>
    </table>
    <div class="basis">Хуваарилах суурь: <b>${basis==='weight'?'жин':basis==='value'?'үнэ':basis==='qty'?'тоо':basis}</b> · Худ.авах нэгж нь зардлыг хуваах суурь, складын нэгж нь эцсийн ₮/нэгж.</div>
  </div>`;
}

function renderPayments(d) {
  if (!d.payments.length) return '<div class="empty">IMP төлбөр холбогдоогүй.</div>';
  const rows = d.payments.map(p => `<div class="pay ${p.is_final?'final':''}">
    <div class="pay-l">
      <div class="pay-row1">
        <span class="pay-amt">${fmt(p.amount)}</span>
        <span class="pay-date">${esc(p.date)}</span>
        <span class="acct ${acctClass(p.account_label)}">${acctShort(p.account_label)}</span>
        ${p.is_final?'<span class="final-tag">★ ЭЦСИЙН</span>':''}
      </div>
      ${p.memo?`<div class="pay-memo">${esc(p.memo)}</div>`:''}
    </div>
  </div>`).join('');
  return `<div class="card">${rows}</div>`;
}

// Read-only нэгж өртгийн хүснэгт (эцсийн өртөг). Засах хяналт БАЙХГҮЙ —
// хуваарилалт нь Claude-тай ярилцаж API-аар хийгдэнэ; энэ дүр зөвхөн ХАРНА.
function renderUnitCosts(d) {
  const fin = d.status === 'finalized';
  if (!d.lines || !d.lines.length) {
    return `<div class="card"><div class="empty">Нэгж өртөг хараахан гараагүй.<br><span style="font-size:11px;color:var(--gray-400)">Зардал хуваарилагдсаны дараа нэр төрөл бүрийн эцсийн өртөг гарна.</span></div></div>`;
  }
  const body = d.lines.map(l => {
    const stock = `${(l.stock_qty||0).toLocaleString()} ${unitMn(l.stock_unit)}`;
    return `<tr>
      <td class="l"><div class="l-name">${esc(l.name)}</div>${l.spec?`<div class="l-spec">${esc(l.spec)}</div>`:''}</td>
      <td><span class="l-stock">${stock}</span></td>
      <td><span class="l-unit">${fmt(l.unit_cost_stock)}</span><div class="l-unit-sub">₮/${unitMn(l.stock_unit)}</div></td>
      <td><span class="l-total">${fmtShort(l.allocated_mnt)}</span></td>
    </tr>`;
  }).join('');
  return `<div class="card" style="padding:10px 12px">
    <table class="ltable">
      <thead><tr><th class="l">Нэр төрөл</th><th>Тоо хэмжээ</th><th>Нэгж өртөг</th><th>Нийт</th></tr></thead>
      <tbody>${body}</tbody>
      <tfoot><tr><td class="l">Нийт</td><td></td><td></td><td><span class="l-total">${fmtShort(d.allocated_total_mnt)}</span></td></tr></tfoot>
    </table>
    <div class="basis">${fin ? '✅ Баталгаажсан эцсийн нэгж өртөг.' : '🟡 Урьдчилсан — бүх зардал хуваарилагдаж баталгаажаагүй байна.'}</div>
  </div>`;
}

// Баталгаажуулах бар — түүхий → баталгаажсан (Cost Workspace finalize/reopen-г ашиглана)
function renderConfirmBar(d) {
  if (d.status === 'finalized') {
    return `<div class="card editbar"><div class="eb-top"><span class="badge fin">✓ Баталгаажсан</span><button class="btn btn-ghost" onclick="doReopen()">Дахин нээх</button></div></div>`;
  }
  if (d.materialized) {
    return `<div class="card editbar"><div class="eb-top"><span class="badge draft">🟡 Урьдчилсан (түүхий)</span><button class="btn btn-ok" onclick="doFinalize()">Баталгаажуулах ✓</button></div></div>`;
  }
  return `<div class="card"><div class="empty" style="padding:14px"><span style="font-size:11.5px">🟡 Түүхий хэлбэр — зардал бүрэн хуваарилагдаж, Claude-аар тэнцэл гарсны дараа баталгаажна.</span></div></div>`;
}

// ══════════════════════════════════════════
//  Editing layer (writes go to db.import_cost_workspaces — склад хөндөгдөхгүй)
// ══════════════════════════════════════════
let DATA = null, curEdit = null, curTag = 'capitalize', curScope = 'shared';
const UNIT_OPTS = ['ton','kg','meter','m2','piece','set','bundle','stick','roll'];
const TYPE_OPTS = ['product','product_adjustment','freight_border_to_ub','freight','customs','customs_duty','vat','tax','bank_fee','fx_loss','agent_fee','other'];
function defaultTagGuess(type){ const t=(type||'').toLowerCase(); return (t.includes('bank')||t.includes('fee')||t.startsWith('fx'))?'period':'capitalize'; }

async function apiSend(path, method, body) {
  const r = await fetch('/api/import' + path, {
    method,
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: body !== undefined ? JSON.stringify(body || {}) : undefined
  });
  if (r.status === 401) { localStorage.clear(); window.location.href = '/'; return { error: 'Нэвтрэх шаардлагатай' }; }
  return r.json();
}

/* sheet helpers */
const sheetEl = document.getElementById('sheet');
function setSheet(title, html) {
  document.getElementById('sheetTitle').textContent = title;
  document.getElementById('sheetBody').innerHTML = html;
  document.getElementById('sheetSave').textContent = 'Хадгалах';
  sheetEl.classList.add('on');
}
function closeSheet(){ sheetEl.classList.remove('on'); }
function field(label, html, hint) { return `<label class="fld"><span class="fld-l">${label}</span>${html}${hint?`<span class="fld-h">${esc(hint)}</span>`:''}</label>`; }
function inp(id, v, type, attrs) { return `<input id="${id}" class="in" type="${type||'text'}" value="${esc(v==null?'':v)}" ${attrs||''}>`; }
function selF(id, opts, v, labelFn) { return `<select id="${id}" class="in">${opts.map(o=>`<option value="${esc(o)}"${o===v?' selected':''}>${esc(labelFn?labelFn(o):o)}</option>`).join('')}</select>`; }
function val(id){ const e=document.getElementById(id); return e?String(e.value).trim():''; }
function numv(id){ const v=parseFloat(val(id)); return isFinite(v)?v:0; }

/* нэр төрөл (line) form */
function openLineSheet(id) {
  const l = id ? (DATA.lines||[]).find(x => (x.line_id||x.lot_id)===id) || {} : {};
  curEdit = { kind:'line', id: id||null };
  setSheet(id ? 'Нэр төрөл засах' : 'Нэр төрөл нэмэх',
    field('Нэр', inp('f_name', l.name)) +
    field('Спец (заавал биш)', inp('f_spec', l.spec)) +
    `<div class="frow">${field('Худ.авах нэгж', selF('f_bunit', UNIT_OPTS, l.buy_unit||'ton', unitMn))}${field('Худ.авах тоо', inp('f_bqty', l.buy_qty, 'number', 'step="any" inputmode="decimal"'))}</div>` +
    `<div class="frow">${field('Складын нэгж', selF('f_sunit', UNIT_OPTS, l.stock_unit||l.buy_unit||'meter', unitMn))}${field('Складын тоо', inp('f_sqty', l.stock_qty, 'number', 'step="any" inputmode="decimal"'))}</div>` +
    `<div class="frow">${field('Хөрвүүлэх коэф.', inp('f_factor', l.conversion_factor||1, 'number', 'step="any" inputmode="decimal"'), '1 склад = ? худ.авах')}${field('Жин (кг)', inp('f_wkg', l.weight_kg, 'number', 'step="any" inputmode="decimal"'), 'жингээр хуваарилахад')}</div>`
  );
  document.getElementById('sheetSave').onclick = saveLine;
}
async function saveLine() {
  const name = val('f_name');
  if (!name) { alert('Нэр оруулна уу'); return; }
  const wkg = val('f_wkg');
  const body = {
    name, spec: val('f_spec'),
    buy_unit: val('f_bunit'), buy_qty: numv('f_bqty'),
    stock_unit: val('f_sunit'), stock_qty: numv('f_sqty'),
    conversion_factor: numv('f_factor') || 1,
    weight_kg: wkg === '' ? null : numv('f_wkg')
  };
  const id = curEdit.id;
  const path = '/cost-workspace/'+encodeURIComponent(orderId)+'/line'+(id?'/'+encodeURIComponent(id):'');
  afterSave(await apiSend(path, id?'PUT':'POST', body));
}

/* зардал (cost) form */
function openCostSheet(id) {
  const c = id ? (DATA.costs||[]).find(x => x.id===id) || {} : {};
  curEdit = { kind:'cost', id: id||null };
  curTag = id ? (c.tag||'capitalize') : defaultTagGuess('product');
  curScope = c.scope || 'shared';
  const lines = DATA.lines||[];
  const lineSel = lines.length
    ? selF('c_line', lines.map(l => l.line_id||l.lot_id), c.line_id||(lines[0].line_id||lines[0].lot_id), (lid)=>lineName(DATA, lid))
    : '<div class="fld-h">Эхлээд нэр төрөл нэмнэ үү.</div>';
  setSheet(id ? 'Зардал засах' : 'Зардал нэмэх',
    `<div class="frow">${field('Төрөл', `<select id="c_type" class="in" onchange="onTypeChange()">${TYPE_OPTS.map(o=>`<option value="${o}"${o===(c.type||'product')?' selected':''}>${esc(typeMn(o))}</option>`).join('')}</select>`)}${field('Дүн (₮)', inp('c_amt', c.amount_mnt, 'number', 'step="any" inputmode="numeric"'))}</div>` +
    field('Тэмдэглэл (заавал биш)', inp('c_note', c.note)) +
    field('Ангилал', `<div class="seg" id="seg_tag"><button type="button" class="seg-b" data-tag="capitalize" onclick="pickTag('capitalize')">🟢 Бараанд шингэнэ</button><button type="button" class="seg-b" data-tag="period" onclick="pickTag('period')">⚪ Ерөнхий</button></div>`) +
    field('Хамрах хүрээ', `<div class="seg" id="seg_scope"><button type="button" class="seg-b" data-scope="shared" onclick="pickScope('shared')">Бүх нэр төрөлд</button><button type="button" class="seg-b" data-scope="direct" onclick="pickScope('direct')">Нэг нэр төрөлд</button></div>`) +
    `<div id="c_line_wrap" style="display:none">${field('Аль нэр төрөл', lineSel)}</div>`
  );
  applyTagScope();
  document.getElementById('sheetSave').onclick = saveCost;
}
function onTypeChange(){ curTag = defaultTagGuess(val('c_type')); applyTagScope(); }
function pickTag(t){ curTag = t; applyTagScope(); }
function pickScope(s){ curScope = s; applyTagScope(); }
function applyTagScope(){
  document.querySelectorAll('#seg_tag .seg-b').forEach(b=>b.classList.toggle('on', b.dataset.tag===curTag));
  document.querySelectorAll('#seg_scope .seg-b').forEach(b=>b.classList.toggle('on', b.dataset.scope===curScope));
  const w=document.getElementById('c_line_wrap'); if(w) w.style.display = curScope==='direct' ? 'block' : 'none';
}
async function saveCost() {
  const body = { type: val('c_type'), amount_mnt: numv('c_amt'), note: val('c_note'), tag: curTag, scope: curScope, line_id: curScope==='direct'?val('c_line'):null };
  if (curScope==='direct' && !body.line_id) { alert('Нэр төрөл сонгоно уу'); return; }
  const id = curEdit.id;
  const path = '/cost-workspace/'+encodeURIComponent(orderId)+'/cost'+(id?'/'+encodeURIComponent(id):'');
  afterSave(await apiSend(path, id?'PUT':'POST', body));
}

/* lifecycle + basis + delete */
async function doMaterialize(){ afterSave(await apiSend('/cost-workspace/'+encodeURIComponent(orderId)+'/materialize','POST')); }
async function setBasis(b){ if(DATA && DATA.basis===b) return; afterSave(await apiSend('/cost-workspace/'+encodeURIComponent(orderId)+'/basis','PUT',{basis:b})); }
async function delLine(id){ if(!confirm('Энэ нэр төрлийг устгах уу?'))return; afterSave(await apiSend('/cost-workspace/'+encodeURIComponent(orderId)+'/line/'+encodeURIComponent(id),'DELETE')); }
async function delCost(id){ if(!confirm('Энэ зардлыг устгах уу?'))return; afterSave(await apiSend('/cost-workspace/'+encodeURIComponent(orderId)+'/cost/'+encodeURIComponent(id),'DELETE')); }
async function doFinalize(){
  const d = await apiSend('/cost-workspace/'+encodeURIComponent(orderId)+'/finalize','POST');
  if (d && d.error){ alert(d.error + (d.lines&&d.lines.length?': '+d.lines.join(', '):'')); return; }
  closeSheet(); render(d);
}
async function doReopen(){ if(!confirm('Дахин нээх үү? Засвар хийх боломжтой болно.'))return; afterSave(await apiSend('/cost-workspace/'+encodeURIComponent(orderId)+'/reopen','POST')); }
function afterSave(d){ if(d && d.error){ alert(d.error); return; } closeSheet(); render(d); }

/* render */
function render(d) {
  DATA = d;
  const body = document.getElementById('body');
  if (d.error){ body.innerHTML = `<div class="empty">${esc(d.error)}</div>`; return; }
  if (d.order && d.order.name && !orderName) document.getElementById('hdrTitle').textContent = d.order.name;
  document.getElementById('hdrSub').textContent = (d.order && d.order.supplier ? d.order.supplier + ' · ' : '') + 'эцсийн өртөг';
  body.innerHTML =
    `<div class="sec"><div class="sec-h">💳 Энэ бараанд төлсөн төлбөрүүд</div>${renderPayments(d)}</div>` +
    `<div class="sec"><div class="sec-h">📦 Эцсийн нэгж өртөг</div>${renderUnitCosts(d)}</div>` +
    `<div class="sec">${renderConfirmBar(d)}</div>`;
}
async function load() {
  const body = document.getElementById('body');
  if (!orderId) { body.innerHTML = '<div class="empty">Бараагаа сонгоно уу.<br><a href="/imports/orders" style="color:var(--brand);font-weight:700;text-decoration:none">← Импортын бараа руу буцах</a></div>'; return; }
  render(await api('/cost-workspace/' + encodeURIComponent(orderId)));
}
load();
</script>
</body>
</html>
