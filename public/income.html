<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>Нийт орлого — Метал ворkинг Центр</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand: #059669; --brand-dark: #047857;
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
  --gray-400: #9ca3af; --gray-600: #4b5563; --gray-900: #111827;
}
body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background: var(--gray-50); color: var(--gray-900); padding-bottom: 30px; -webkit-font-smoothing: antialiased; }

.id-bar {
  background: linear-gradient(135deg, #047857 0%, #059669 100%);
  color: #fff; padding: 18px 20px;
  border-radius: 0 0 20px 20px;
  box-shadow: 0 4px 12px rgba(4,120,87,0.18);
}
.id-top { display: flex; align-items: center; gap: 12px; }
.id-back { font-size: 22px; color: #fff; text-decoration: none; padding: 4px 8px; }
.id-title { font-size: 17px; font-weight: 700; }
.id-sub { font-size: 11px; opacity: 0.85; margin-top: 3px; }
.id-hero { margin-top: 14px; }
.id-hero-lbl { font-size: 11px; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; }
.id-hero-val { font-size: 26px; font-weight: 900; margin-top: 4px; line-height: 1; }
.id-hero-sub { font-size: 11px; opacity: 0.8; margin-top: 6px; }

.section { padding: 18px 16px 0; }
.section-label { font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 1.3px; margin-bottom: 12px; padding: 0 4px; }

.chips { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 12px; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 8px 14px;
  border: 1.5px solid var(--gray-200); border-radius: 20px;
  background: #fff; font-size: 12px; font-weight: 600;
  color: var(--gray-600); cursor: pointer; white-space: nowrap;
}
.chip.active { background: var(--brand-dark); border-color: var(--brand-dark); color: #fff; }
.chip-count { display: inline-block; margin-left: 5px; padding: 1px 6px; background: rgba(0,0,0,0.08); border-radius: 8px; font-size: 10px; }
.chip.active .chip-count { background: rgba(255,255,255,0.2); }

.date-filter { display: flex; gap: 6px; margin-bottom: 12px; }
.date-btn {
  flex: 1; padding: 7px 8px;
  border: 1.5px solid var(--gray-200); border-radius: 8px;
  background: #fff; font-size: 11.5px; font-weight: 600;
  color: var(--gray-600); cursor: pointer;
}
.date-btn.active { background: #f3f4f6; border-color: var(--brand-dark); color: var(--brand-dark); }

.summary-strip {
  background: #fff; border-radius: 12px;
  padding: 12px 16px; margin-bottom: 12px;
  border: 1px solid var(--gray-200);
  display: flex; justify-content: space-between; align-items: center;
}
.ss-lbl { font-size: 11px; color: var(--gray-600); }
.ss-val { font-size: 16px; font-weight: 800; color: var(--brand-dark); }

.tx-card {
  background: #fff; border-radius: 12px;
  padding: 12px 14px; margin-bottom: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04); border: 1px solid var(--gray-200);
  border-left: 4px solid var(--brand);
}
.tx-card.cat-sales   { border-left-color: #059669; }
.tx-card.cat-advance { border-left-color: #f59e0b; }
.tx-card.cat-funding { border-left-color: #6d28d9; }
.tx-card.cat-loan    { border-left-color: #00838f; }
.tx-card.cat-other   { border-left-color: var(--gray-400); }
.tx-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.tx-code { display: inline-block; font-family: monospace; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 5px; background: var(--gray-100); color: var(--gray-600); }
.tx-desc { font-size: 13px; font-weight: 600; color: var(--gray-900); margin-top: 6px; line-height: 1.4; }
.tx-amt { font-size: 14.5px; font-weight: 800; color: var(--brand-dark); white-space: nowrap; }
.tx-meta { font-size: 10.5px; color: var(--gray-400); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--gray-100); display: flex; gap: 10px; flex-wrap: wrap; }

.empty { text-align: center; color: var(--gray-400); padding: 40px 20px; font-size: 13px; }
</style>
</head>
<body>

<div class="id-bar">
  <div class="id-top">
    <a class="id-back" href="/finance">‹</a>
    <div style="flex:1">
      <div class="id-title">🟢 Нийт орлого</div>
      <div class="id-sub">Борлуулалт, хөрөнгө оруулалт, зээл</div>
    </div>
  </div>
  <div class="id-hero">
    <div class="id-hero-lbl">Шүүлтүүрт тохирох нийт</div>
    <div class="id-hero-val" id="filterTotal">— ₮</div>
    <div class="id-hero-sub" id="filterTotalSub">— гүйлгээ</div>
  </div>
</div>

<div class="section">
  <div class="section-label">Ангилал</div>
  <div class="chips" id="catChips"></div>

  <div class="section-label">Хугацаа</div>
  <div class="date-filter">
    <button class="date-btn" data-d="today" onclick="setDate('today')">Өнөөдөр</button>
    <button class="date-btn" data-d="week"  onclick="setDate('week')">7 хоног</button>
    <button class="date-btn active" data-d="month" onclick="setDate('month')">Энэ сар</button>
    <button class="date-btn" data-d="all"   onclick="setDate('all')">Бүгд</button>
  </div>

  <div class="section-label">Гүйлгээ</div>
  <div id="txList"></div>
</div>

<script src="/js/bottom-nav.js"></script>
<script src="/js/finance-constants.js"></script>
<script>
const token = localStorage.getItem('token');
const user  = JSON.parse(localStorage.getItem('user') || '{}');
if (!token) window.location.href = '/';

async function api(path) {
  const r = await fetch('/api' + path, { headers: { 'Authorization': 'Bearer ' + token }});
  if (r.status === 401) { localStorage.clear(); window.location.href = '/'; }
  return r.json();
}
function fmt(n) { return Number(n||0).toLocaleString('mn-MN'); }

// Categories of income
const CATEGORIES = [
  { key: 'all',     label: 'Бүгд',              codes: INCOME_CODES },
  { key: 'sales',   label: '\u{1F6D2} Борлуулалт',     codes: ['SALE','REC'] },
  { key: 'advance', label: '\u{1F7E1} Урьдчилгаа',     codes: ['ADV'] },
  { key: 'funding', label: '\u{1F4BC} Хөрөнгө оруулалт', codes: ['INV'] },
  { key: 'loan',    label: '\u{1F501} Зээл буцаалт',   codes: ['LOAN_IN'] },
];

let allTx = [];
let activeCat = 'all';
let activeDate = 'month';

function thisMonth() { return new Date().toISOString().slice(0,7); }
function today()     { return new Date().toISOString().slice(0,10); }
function weekStart() { const d = new Date(); d.setDate(d.getDate() - 6); return d.toISOString().slice(0,10); }

function isInDate(t) {
  if (activeDate === 'all') return true;
  if (activeDate === 'today') return t.date === today();
  if (activeDate === 'week')  return t.date >= weekStart();
  if (activeDate === 'month') return t.date.slice(0,7) === thisMonth();
  return true;
}

function getCat(t) {
  if (['SALE','REC'].includes(t.code))  return 'sales';
  if (t.code === 'ADV')                  return 'advance';
  if (t.code === 'INV')                  return 'funding';
  if (t.code === 'LOAN_IN')              return 'loan';
  return 'other';
}

function setCat(key) {
  activeCat = key;
  document.querySelectorAll('.chip').forEach(el => el.classList.toggle('active', el.dataset.cat === key));
  render();
}
function setDate(key) {
  activeDate = key;
  document.querySelectorAll('.date-btn').forEach(el => el.classList.toggle('active', el.dataset.d === key));
  render();
}

function render() {
  // Filter by date first
  const dateFiltered = allTx.filter(isInDate);
  // All income tx (matches CATEGORIES[0].codes)
  const incomeTx = dateFiltered.filter(t => CATEGORIES[0].codes.includes(t.code));

  // Counts per category
  const counts = {};
  for (const c of CATEGORIES) {
    counts[c.key] = incomeTx.filter(t => c.codes.includes(t.code)).length;
  }

  // Render chips
  const chipsEl = document.getElementById('catChips');
  chipsEl.innerHTML = CATEGORIES.map(c => `
    <button class="chip ${c.key === activeCat ? 'active' : ''}" data-cat="${c.key}" onclick="setCat('${c.key}')">
      ${c.label} <span class="chip-count">${counts[c.key]}</span>
    </button>`).join('');

  // Apply active category
  const activeCategory = CATEGORIES.find(c => c.key === activeCat);
  const filtered = incomeTx.filter(t => activeCategory.codes.includes(t.code));

  const total = filtered.reduce((s,t) => s + (t.amount || 0), 0);
  document.getElementById('filterTotal').textContent = fmt(total) + ' ₮';
  document.getElementById('filterTotalSub').textContent = filtered.length + ' гүйлгээ';

  // Sort newest first
  filtered.sort((a,b) => {
    if (a.date !== b.date) return b.date.localeCompare(a.date);
    return (b.time||'').localeCompare(a.time||'');
  });

  const el = document.getElementById('txList');
  if (!filtered.length) { el.innerHTML = '<div class="empty">Гүйлгээ байхгүй</div>'; return; }

  el.innerHTML = filtered.map(t => {
    const cat = getCat(t);
    const acctShort = (t.account_label || '').replace(' (Касс)','').replace(' (Компани)','');
    return `<div class="tx-card cat-${cat}">
      <div class="tx-top">
        <span class="tx-code">${t.code || '—'}</span>
        <div class="tx-amt">+${fmt(t.amount)} ₮</div>
      </div>
      <div class="tx-desc">${t.description || '—'}</div>
      <div class="tx-meta">
        <span>📅 ${t.date}${t.time ? ' ' + t.time : ''}</span>
        <span>🏦 ${acctShort}</span>
        ${t.counterparty ? `<span>#${t.counterparty}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function load() {
  allTx = await api('/finance/transactions') || [];
  render();
}
load();
</script>
</body>
</html>
