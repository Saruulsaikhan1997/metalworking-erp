<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>Эцсийн өртөг (склад орохын өмнө) — Метал Воркинг Центр</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand: #1565c0; --brand-dark: #0d47a1;
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
  --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563; --gray-900: #111827;
  --green: #059669; --amber: #d97706; --blue: #2563eb; --red: #dc2626; --purple: #7c3aed;
}
body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background: var(--gray-50); color: var(--gray-900); padding-bottom: 90px; -webkit-font-smoothing: antialiased; }

.hdr {
  background: linear-gradient(135deg, #0d47a1 0%, #1565c0 100%);
  color: #fff; padding: 18px 20px 16px; border-radius: 0 0 20px 20px;
  box-shadow: 0 4px 12px rgba(13,71,161,0.18);
}
.hdr-top { display: flex; align-items: center; gap: 12px; }
.hdr-back { font-size: 22px; color: #fff; text-decoration: none; padding: 4px 8px; }
.hdr-title { font-size: 17px; font-weight: 700; flex: 1; }
.hdr-sub { font-size: 11px; opacity: 0.85; margin-top: 3px; }

.sec { padding: 14px 14px 0; }

/* Shipment card */
.card {
  background: #fff; border-radius: 16px; margin-bottom: 14px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06); border: 1px solid var(--gray-200);
  border-left: 5px solid var(--gray-400); overflow: hidden;
}
.card.pending { border-left-color: var(--amber); }
.card.partial { border-left-color: var(--blue); }
.card.received { border-left-color: var(--green); }

.c-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; padding: 14px 14px 10px; }
.c-name { font-size: 15px; font-weight: 800; }
.c-meta { font-size: 10.5px; color: var(--gray-500); margin-top: 3px; }
.c-code { font-family: monospace; font-size: 10px; color: var(--gray-400); }
.badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 10px; white-space: nowrap; }
.badge.pending { background: #fef3c7; color: #92400e; }
.badge.partial { background: #dbeafe; color: #1e40af; }
.badge.received { background: #d1fae5; color: #065f46; }

/* Final cost table */
table { width: 100%; border-collapse: collapse; }
thead th {
  font-size: 9.5px; color: var(--gray-400); font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.4px; text-align: right; padding: 6px 14px; background: var(--gray-50);
  border-top: 1px solid var(--gray-200); border-bottom: 1px solid var(--gray-200);
}
thead th.l { text-align: left; }
tbody td { padding: 9px 14px; border-bottom: 1px solid var(--gray-100); font-size: 12.5px; text-align: right; vertical-align: top; }
tbody td.l { text-align: left; }
tbody tr:last-child td { border-bottom: none; }
.r-name { font-weight: 700; }
.r-name-row { display: flex; align-items: center; gap: 9px; }
.r-thumb { width: 42px; height: 42px; border-radius: 8px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--gray-100); cursor: zoom-in; background: var(--gray-100); }
.c-ref { display: block; margin: 0 0 12px; }
.c-ref img { width: 100%; max-height: 220px; object-fit: contain; border-radius: 12px; border: 1px solid var(--gray-100); background: #fff; cursor: zoom-in; }
.c-ref-label { font-size: 10.5px; color: var(--gray-500); font-weight: 600; margin: 6px 2px 0; }
.r-spec { font-size: 10px; color: var(--gray-500); margin-top: 2px; font-family: monospace; }
.r-qty { color: var(--gray-600); white-space: nowrap; }
.r-unit-cost { font-weight: 900; color: var(--purple); white-space: nowrap; }
.r-unit-sub { font-size: 9px; color: var(--gray-400); font-weight: 600; }
.r-total { font-weight: 700; color: var(--brand-dark); white-space: nowrap; }
.r-kg { font-size: 9.5px; color: var(--gray-400); margin-top: 2px; }

/* footer total row */
tfoot td { padding: 10px 14px; font-size: 12.5px; font-weight: 800; border-top: 2px solid var(--gray-200); text-align: right; }
tfoot td.l { text-align: left; color: var(--gray-500); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
tfoot td .r-total { color: var(--brand-dark); }

/* breakdown strip */
.bd-wrap { padding: 10px 14px 14px; }
.bd-bar { display: flex; height: 9px; border-radius: 5px; overflow: hidden; margin-bottom: 7px; background: var(--gray-100); }
.bd-seg { height: 100%; }
.bd-seg.product { background: var(--brand); } .bd-seg.freight { background: var(--green); }
.bd-seg.customs { background: var(--amber); } .bd-seg.tax { background: var(--red); } .bd-seg.other { background: var(--gray-400); }
.bd-rows { display: flex; flex-wrap: wrap; gap: 5px 14px; }
.bd-row { display: flex; align-items: center; gap: 5px; font-size: 11px; }
.bd-dot { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; }
.bd-dot.product { background: var(--brand); } .bd-dot.freight { background: var(--green); }
.bd-dot.customs { background: var(--amber); } .bd-dot.tax { background: var(--red); } .bd-dot.other { background: var(--gray-400); }
.bd-name { color: var(--gray-600); } .bd-val { font-weight: 700; } .bd-pct { color: var(--gray-400); font-size: 9.5px; }

.warn { margin: 0 14px 12px; padding: 9px 11px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 9px; font-size: 11px; color: #92400e; }
.empty { text-align: center; color: var(--gray-400); padding: 50px 20px; font-size: 13px; }
.note { font-size: 10px; color: var(--gray-400); text-align: center; padding: 4px 16px 0; line-height: 1.5; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <a class="hdr-back" id="backLink" href="/imports/orders">‹</a>
    <div style="flex:1">
      <div class="hdr-title" id="hdrTitle">Эцсийн өртөг — склад орохын өмнө</div>
      <div class="hdr-sub" id="hdrSub">Ачилт бүрийн нэр төрөл бүрийн бодит өртөг</div>
    </div>
  </div>
</div>

<div class="sec" id="list"></div>
<div class="note">Бараа склад орохоос өмнө нэр төрөл бүрийн эцсийн өртгийг баталгаажуулна. Нэгж өртөг = бизнес нэгж (метр/м²/ширхэг) дэх бодит өртөг.</div>

<script src="/js/bottom-nav.js"></script>
<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = '/';

async function api(path) {
  const r = await fetch('/api/import' + path, { headers: { 'Authorization': 'Bearer ' + token }});
  if (r.status === 401) { localStorage.clear(); window.location.href = '/'; }
  return r.json();
}

function fmt(n) {
  if (!n) return '0₮';
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'') + 'сая₮';
  return Math.round(n).toLocaleString() + '₮';
}
function fmtFull(n) { return Math.round(n||0).toLocaleString() + '₮'; }
const UNIT_MN = { meter:'метр', kg:'кг', ton:'тонн', m2:'м²', piece:'ш', set:'иж', bundle:'багц', stick:'ш' };
function unitMn(u) { return UNIT_MN[u] || u || ''; }

const WSTATE = {
  pending:  { l:'⏳ Склад орохоос өмнө', c:'pending' },
  partial:  { l:'◐ Хэсэгчилэн орсон',   c:'partial' },
  received: { l:'✅ Склад орсон',         c:'received' }
};

const BD = [
  { k:'product', n:'Бараа' }, { k:'freight', n:'Тээвэр' },
  { k:'customs', n:'Гааль' }, { k:'tax', n:'НӨАТ' }, { k:'other', n:'Бусад' }
];

function aggBreakdown(rows) {
  const b = { product:0, freight:0, customs:0, tax:0, other:0 };
  for (const r of rows) for (const k in b) b[k] += (r.breakdown[k]||0);
  return b;
}
function renderBreakdown(b) {
  const total = BD.reduce((s,x)=>s+(b[x.k]||0),0);
  if (total <= 0) return '';
  const bar = BD.map(x => { const v=b[x.k]||0; if(!v) return ''; return `<div class="bd-seg ${x.k}" style="width:${(v/total*100).toFixed(2)}%"></div>`; }).join('');
  const rows = BD.filter(x=>(b[x.k]||0)>0).map(x => {
    const v=b[x.k]||0;
    return `<div class="bd-row"><span class="bd-dot ${x.k}"></span><span class="bd-name">${x.n}</span><span class="bd-val">${fmt(v)}</span><span class="bd-pct">${(v/total*100).toFixed(0)}%</span></div>`;
  }).join('');
  return `<div class="bd-wrap"><div class="bd-bar">${bar}</div><div class="bd-rows">${rows}</div></div>`;
}

function renderRow(r) {
  const qtyTxt = `${r.business_qty.toLocaleString()} ${unitMn(r.business_unit)}`;
  const kgLine = r.same_unit ? '' :
    `<div class="r-kg">${r.business_qty.toLocaleString()}${unitMn(r.business_unit)} · ${fmt(r.inventory_unit_cost)}/${unitMn(r.inventory_unit)}</div>`;
  const specLine = r.spec ? `<div class="r-spec">${r.spec}</div>` : '';
  const thumb = r.image ? `<img class="r-thumb" src="${r.image}" alt="${r.name}" onclick="window.open('${r.image}','_blank')" loading="lazy">` : '';
  return `<tr>
    <td class="l"><div class="r-name-row">${thumb}<div><div class="r-name">${r.name}</div>${specLine}</div></div></td>
    <td><span class="r-qty">${qtyTxt}</span>${kgLine}</td>
    <td><span class="r-unit-cost">${fmtFull(r.business_unit_cost)}</span><div class="r-unit-sub">₮/${unitMn(r.business_unit)}</div></td>
    <td><span class="r-total">${fmt(r.total_landed_cost)}</span></td>
  </tr>`;
}

function renderShipment(s) {
  const ws = WSTATE[s.warehouse_state] || WSTATE.pending;
  const warn = !s.all_allocated
    ? `<div class="warn">⚠️ Зарим нэр төрлийн өртөг бүрэн тооцоологдоогүй (allocation хийгдээгүй). Энэ хүснэгт дутуу байж болзошгүй.</div>` : '';
  return `<div class="card ${ws.c}">
    <div class="c-top">
      <div style="flex:1;min-width:0">
        <div class="c-name">${s.product_name}</div>
        <div class="c-meta"><span class="c-code">${s.shipment_code}</span>${s.supplier ? ' · '+s.supplier : ''} · ${s.lot_count} нэр төрөл</div>
      </div>
      <span class="badge ${ws.c}">${ws.l}</span>
    </div>
    ${s.reference_image ? `<div class="c-ref"><img src="${s.reference_image}" alt="Лавлах зураг" onclick="window.open('${s.reference_image}','_blank')"><div class="c-ref-label">📷 Нийлүүлэгчийн лавлах зураг</div></div>` : ''}
    ${warn}
    <table>
      <thead><tr>
        <th class="l">Нэр төрөл</th><th>Тоо хэмжээ</th><th>Нэгж өртөг</th><th>Нийт</th>
      </tr></thead>
      <tbody>${s.rows.map(renderRow).join('')}</tbody>
      <tfoot><tr>
        <td class="l">Нийт</td><td></td><td></td><td><span class="r-total">${fmt(s.total_landed_cost)}</span></td>
      </tr></tfoot>
    </table>
    ${renderBreakdown(aggBreakdown(s.rows))}
  </div>`;
}

// Per-good scope: this page always shows ONE good's final cost (opened from
// that good's card on /imports/orders). The all-goods list was removed.
const params = new URLSearchParams(location.search);
const orderId = params.get('order');
const orderName = params.get('name');
if (orderName) {
  document.getElementById('hdrTitle').textContent = orderName;
  document.getElementById('hdrSub').textContent = 'Эцсийн өртөг — склад орохын өмнө';
}

async function load() {
  if (!orderId) {
    document.getElementById('list').innerHTML = '<div class="empty">Бараагаа сонгоно уу.<br><a href="/imports/orders" style="color:var(--brand);font-weight:700;text-decoration:none">← Импортын бараа руу буцах</a></div>';
    return;
  }
  const data = await api('/final-cost?order=' + encodeURIComponent(orderId));
  if (!Array.isArray(data) || !data.length) {
    document.getElementById('list').innerHTML = '<div class="empty">Энэ барааны эцсийн өртөг хараахан гараагүй.<br><span style="font-size:11px;color:var(--gray-400)">Ачилт бүртгэгдэж, зардал хуваарилагдсаны дараа харагдана.</span></div>';
    return;
  }
  document.getElementById('list').innerHTML = data.map(renderShipment).join('');
}
load();
</script>
</body>
</html>
