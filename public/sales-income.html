<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>Борлуулалтын орлого — Метал воркинг Центр</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand-dark: #1b5e20;
  --brand: #2e7d32;
  --brand-light: #43a047;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
}
body {
  font-family: -apple-system, "Helvetica Neue", "SF Pro Text", Arial, sans-serif;
  background: var(--gray-50);
  color: var(--gray-900);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 40px;
}

/* ── Header ── */
.id-bar {
  background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 60%, #388e3c 100%);
  color: #fff;
  padding: 18px 16px 22px;
  border-radius: 0 0 24px 24px;
  box-shadow: 0 4px 16px rgba(27,94,32,0.18);
  position: relative; overflow: hidden;
}
.id-bar::before {
  content: ''; position: absolute; top: -50px; right: -50px;
  width: 180px; height: 180px; border-radius: 50%;
  background: rgba(255,255,255,0.06);
}
.id-top { display: flex; align-items: center; gap: 12px; }
.back-btn {
  font-size: 20px; color: #fff; text-decoration: none;
  width: 38px; height: 38px; border-radius: 11px;
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.id-title { font-size: 17px; font-weight: 800; letter-spacing: 0.3px; }
.id-sub { font-size: 11.5px; opacity: 0.9; margin-top: 3px; }

/* ── Summary strip ── */
.summary {
  margin: -14px 16px 0;
  background: #fff;
  border-radius: 16px;
  padding: 16px 18px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  border: 1px solid var(--gray-200);
  position: relative; z-index: 2;
}
.summary-amt { font-size: 24px; font-weight: 900; color: var(--brand); letter-spacing: -0.5px; }
.summary-lbl { font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.summary-meta { font-size: 12px; color: var(--gray-600); margin-top: 6px; }

/* ── Note ── */
.note {
  margin: 12px 16px 0;
  background: #ecfdf5;
  border: 1px solid #a7f3d0;
  border-radius: 12px;
  padding: 11px 14px;
  font-size: 11.5px; color: #065f46; line-height: 1.5;
}

/* ── List ── */
.section { padding: 18px 16px 0; }
.section-label {
  font-size: 11px; font-weight: 700; color: var(--gray-400);
  text-transform: uppercase; letter-spacing: 1.3px;
  margin-bottom: 10px; padding: 0 4px;
}
.row {
  background: #fff;
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 9px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  border: 1px solid var(--gray-200);
  border-left: 4px solid var(--brand-light);
  display: flex; align-items: center; gap: 12px;
}
.row-main { flex: 1; min-width: 0; }
.row-memo {
  font-size: 14px; font-weight: 700; color: var(--gray-900); line-height: 1.35;
  word-break: break-word;
}
.row-date { font-size: 11.5px; color: var(--gray-400); margin-top: 4px; font-weight: 600; }
.row-amt { font-size: 15px; font-weight: 800; color: var(--brand); white-space: nowrap; }

.empty {
  text-align: center; padding: 48px 24px; color: var(--gray-400);
}
.empty-icon { font-size: 44px; margin-bottom: 12px; }
.empty-title { font-size: 15px; font-weight: 700; color: var(--gray-600); }
.empty-sub { font-size: 12.5px; margin-top: 6px; line-height: 1.5; }
.loading { text-align: center; padding: 40px; color: var(--gray-400); font-size: 13px; }
</style>
</head>
<body>

<div class="id-bar">
  <div class="id-top">
    <a class="back-btn" href="/dashboard">‹</a>
    <div>
      <div class="id-title">💰 Борлуулалтын орлого</div>
      <div class="id-sub">Банкны хуулга · SALE гүйлгээ</div>
    </div>
  </div>
</div>

<div class="summary">
  <div class="summary-lbl">Нийт борлуулалтын орлого</div>
  <div class="summary-amt" id="totalAmt">— ₮</div>
  <div class="summary-meta" id="totalMeta">Ачааллаж байна...</div>
</div>

<div class="note">
  ℹ️ Эдгээр нь банкны хуулгад <b>SALE</b> кодоор орсон борлуулалтын орлогууд. Менежер эдгээрийг гар [за]лагийн падаантай тулгаж <b>ангилан</b> дэлгэрэнгүй бүртгэнэ.
</div>

<div class="section">
  <div class="section-label">📋 Гүйлгээний жагсаалт</div>
  <div id="list"><div class="loading">Ачааллаж байна...</div></div>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = '/';

function fmt(n) { return (Math.round(Number(n) || 0)).toLocaleString('en-US'); }
function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function load() {
  try {
    const r = await fetch('/api/sales-income', { headers: { 'Authorization': 'Bearer ' + token } });
    if (r.status === 401 || r.status === 403) { window.location.href = '/'; return; }
    if (!r.ok) throw new Error('failed');
    const list = await r.json();

    const total = list.reduce((s, t) => s + (Number(t.amount) || 0), 0);
    document.getElementById('totalAmt').textContent = fmt(total) + ' ₮';
    document.getElementById('totalMeta').textContent = list.length + ' гүйлгээ';

    const el = document.getElementById('list');
    if (!list.length) {
      el.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🧾</div>
          <div class="empty-title">SALE гүйлгээ хараахан алга</div>
          <div class="empty-sub">Банкны хуулгад SALE кодоор борлуулалт орох үед эндээс харагдана.</div>
        </div>`;
      return;
    }

    el.innerHTML = list.map(t => `
      <div class="row">
        <div class="row-main">
          <div class="row-memo">${escapeHtml(t.memo) || '<span style="color:#9ca3af">(утга байхгүй)</span>'}</div>
          <div class="row-date">📅 ${escapeHtml(t.date || '—')}</div>
        </div>
        <div class="row-amt">${fmt(t.amount)} ₮</div>
      </div>`).join('');
  } catch (_) {
    document.getElementById('totalMeta').textContent = 'Алдаа гарлаа';
    document.getElementById('list').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Ачаалж чадсангүй</div>
        <div class="empty-sub">Дахин оролдоно уу.</div>
      </div>`;
  }
}
load();

window.addEventListener('pageshow', (e) => {
  if (e.persisted || document.visibilityState === 'visible') load();
});
</script>
</body>
</html>
