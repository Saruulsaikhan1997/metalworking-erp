<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>Металворкинг — Нэвтрэх</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, Arial, sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: #fff; border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.logo { text-align: center; margin-bottom: 28px; }
.logo h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; }
.logo p { font-size: 12px; color: #888; margin-top: 4px; }
label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; }
input { width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 15px; outline: none; transition: border 0.2s; }
input:focus { border-color: #1a1a2e; }
.field { margin-bottom: 18px; }
button { width: 100%; padding: 14px; background: #1a1a2e; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; }
button:active { background: #2d2d4e; }
.err { color: #e53935; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Металворкинг Центр ХХК</h1>
    <p>Удирдлагын систем</p>
  </div>
  <div class="field">
    <label>Нэвтрэх нэр</label>
    <input type="text" id="username" placeholder="username" autocomplete="username">
  </div>
  <div class="field">
    <label>Нууц үг</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button onclick="login()">Нэвтрэх</button>
  <div class="err" id="err"></div>
</div>
<script>
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('err');
  err.style.display = 'none';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await r.json();
    if (!r.ok) { err.textContent = data.error; err.style.display = 'block'; return; }
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = '/dashboard';
  } catch {
    err.textContent = 'Холболтын алдаа гарлаа'; err.style.display = 'block';
  }
}
</script>
</body>
</html>
