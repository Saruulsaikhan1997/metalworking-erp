<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>Мэдээ — Метал ворkинг Центр</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand: #6a1b9a; --brand-dark: #4a148c;
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
  --gray-400: #9ca3af; --gray-600: #4b5563; --gray-900: #111827;
}
body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background: var(--gray-50); color: var(--gray-900); padding-bottom: 80px; -webkit-font-smoothing: antialiased; }

.id-bar {
  background: linear-gradient(135deg, #4a148c 0%, #6a1b9a 100%);
  color: #fff; padding: 18px 20px;
  border-radius: 0 0 20px 20px;
  box-shadow: 0 4px 12px rgba(74,20,140,0.18);
}
.id-top { display: flex; align-items: center; gap: 12px; }
.id-back { font-size: 22px; color: #fff; text-decoration: none; padding: 4px 8px; }
.id-title { font-size: 17px; font-weight: 700; }
.id-sub { font-size: 11px; opacity: 0.85; margin-top: 3px; }

.section { padding: 18px 16px 0; }

/* ── Admin FAB ── */
.fab {
  position: fixed; right: 18px; bottom: 22px;
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, #4a148c, #6a1b9a);
  color: #fff; border: none;
  box-shadow: 0 6px 18px rgba(74,20,140,0.4);
  font-size: 28px; cursor: pointer; z-index: 100;
  display: flex; align-items: center; justify-content: center;
}
.fab:active { transform: scale(0.92); }

/* ── News card ── */
.news-card {
  background: #fff; border-radius: 16px;
  margin-bottom: 14px; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  border: 1px solid var(--gray-200);
}
.news-card.urgent    { border-left: 5px solid #dc2626; }
.news-card.important { border-left: 5px solid #d97706; }
.news-card.normal    { border-left: 5px solid #6b7280; }

.news-images { display: flex; gap: 2px; }
.news-images img {
  flex: 1; height: 200px; object-fit: cover;
  display: block; cursor: pointer;
  -webkit-touch-callout: none;
}
.news-images.single img { height: 240px; }
.news-images.dbl img { height: 180px; }
.news-images.tri img { height: 140px; }

.news-body { padding: 14px 16px 16px; }
.news-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.news-title { font-size: 15px; font-weight: 800; color: var(--gray-900); line-height: 1.3; flex: 1; }
.priority-tag {
  display: inline-block; font-size: 10px; font-weight: 800;
  padding: 3px 9px; border-radius: 6px;
  letter-spacing: 0.4px; white-space: nowrap; flex-shrink: 0;
}
.priority-tag.urgent    { background: #fee2e2; color: #991b1b; }
.priority-tag.important { background: #ffedd5; color: #9a3412; }
.priority-tag.normal    { background: #f3f4f6; color: #4b5563; }

.news-text { font-size: 13px; color: var(--gray-600); line-height: 1.55; white-space: pre-wrap; }
.news-meta {
  font-size: 11px; color: var(--gray-400);
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--gray-100);
  display: flex; justify-content: space-between; align-items: center;
}
.news-actions { display: flex; gap: 6px; }
.news-action-btn {
  font-size: 10.5px; font-weight: 600;
  padding: 4px 10px; border-radius: 5px; cursor: pointer;
  border: 1px solid var(--gray-200); background: #fff; color: var(--gray-600);
}
.news-action-btn.danger { color: #c62828; border-color: #fca5a5; }
.news-action-btn:active { background: var(--gray-100); }

.empty-state { text-align: center; padding: 60px 20px; }
.empty-state .icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
.empty-state h2 { font-size: 15px; font-weight: 700; color: var(--gray-600); margin-bottom: 6px; }
.empty-state p { font-size: 12px; color: var(--gray-400); max-width: 280px; margin: 0 auto; line-height: 1.6; }

/* ── Editor modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200;
  display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: #fff; width: 100%; max-width: 520px;
  border-radius: 18px 18px 0 0; max-height: 92vh; overflow-y: auto;
  padding: 16px 16px calc(16px + env(safe-area-inset-bottom, 0));
}
.modal-handle {
  width: 40px; height: 4px; background: var(--gray-200);
  border-radius: 2px; margin: 6px auto 14px;
}
.modal-title { font-size: 16px; font-weight: 800; margin-bottom: 14px; }

.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 700; color: var(--gray-600); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.field input, .field textarea {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--gray-200); border-radius: 10px;
  font-size: 14px; font-family: inherit; outline: none;
  background: #fff;
  -webkit-appearance: none;
}
.field textarea { resize: vertical; min-height: 100px; }
.field input:focus, .field textarea:focus { border-color: var(--brand-dark); }

.priority-row { display: flex; gap: 6px; }
.priority-opt {
  flex: 1; padding: 11px;
  border: 1.5px solid var(--gray-200); border-radius: 10px;
  background: #fff; cursor: pointer; text-align: center;
  font-size: 12px; font-weight: 700; color: var(--gray-600);
}
.priority-opt.urgent.active    { background: #fee2e2; border-color: #dc2626; color: #991b1b; }
.priority-opt.important.active { background: #ffedd5; border-color: #d97706; color: #9a3412; }
.priority-opt.normal.active    { background: #f3f4f6; border-color: #6b7280; color: #1f2937; }

.image-picker {
  border: 2px dashed var(--gray-200); border-radius: 10px;
  padding: 14px; text-align: center; cursor: pointer;
  background: var(--gray-50);
  -webkit-touch-callout: none;
}
.image-picker:active { background: var(--gray-100); }
.image-picker.has-files { border-color: var(--brand); background: #faf5ff; }
.image-picker-icon { font-size: 24px; line-height: 1; margin-bottom: 4px; }
.image-picker-text { font-size: 12px; color: var(--gray-600); }
#imageInput { display: none; }

.preview-strip { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.preview-item {
  width: 70px; height: 70px; border-radius: 8px;
  background-size: cover; background-position: center;
  position: relative;
}
.preview-remove {
  position: absolute; top: -6px; right: -6px;
  width: 22px; height: 22px; border-radius: 50%;
  background: #dc2626; color: #fff; border: none;
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

.btn-row { display: flex; gap: 8px; margin-top: 14px; }
.modal-save {
  flex: 1; padding: 14px;
  background: var(--brand-dark); color: #fff;
  border: none; border-radius: 12px;
  font-size: 14px; font-weight: 800; cursor: pointer;
}
.modal-cancel {
  padding: 14px 18px;
  background: var(--gray-100); color: var(--gray-600);
  border: none; border-radius: 12px;
  font-size: 13px; font-weight: 600; cursor: pointer;
}

/* ── Image viewer ── */
.viewer-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 300;
  display: none; align-items: center; justify-content: center;
}
.viewer-overlay.open { display: flex; }
.viewer-overlay img { max-width: 100%; max-height: 100vh; }
.viewer-close {
  position: absolute; top: 16px; right: 16px;
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(255,255,255,0.2); color: #fff;
  border: none; font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
</style>
</head>
<body>

<div class="id-bar">
  <div class="id-top">
    <a class="id-back" href="/dashboard">‹</a>
    <div style="flex:1">
      <div class="id-title">📰 Мэдээ ба зарлал</div>
      <div class="id-sub">Дотоод мэдээллийн самбар</div>
    </div>
  </div>
</div>

<div class="section" id="newsList">
  <div style="text-align:center;padding:40px;color:#9ca3af">Ачааллаж байна...</div>
</div>

<!-- Admin FAB -->
<button class="fab" id="fabBtn" style="display:none" onclick="openEditor()">+</button>

<!-- Editor Modal -->
<div class="modal-overlay" id="editorModal" onclick="closeEditorIfBackdrop(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="editorTitle">Шинэ зарлал</div>

    <div class="field">
      <label>Гарчиг *</label>
      <input type="text" id="ed-title" placeholder="Тухайлбал: Энэ долоо хоногийн зорилт">
    </div>

    <div class="field">
      <label>Дэлгэрэнгүй текст</label>
      <textarea id="ed-body" placeholder="Тайлбар, зорилт, анхааруулга..."></textarea>
    </div>

    <div class="field">
      <label>Зэрэг *</label>
      <div class="priority-row">
        <button type="button" class="priority-opt normal active" data-prio="normal" onclick="setPriority('normal')">Энгийн</button>
        <button type="button" class="priority-opt important" data-prio="important" onclick="setPriority('important')">Чухал</button>
        <button type="button" class="priority-opt urgent" data-prio="urgent" onclick="setPriority('urgent')">Яаралтай</button>
      </div>
    </div>

    <div class="field" id="imagePickerField">
      <label>Зураг (1-3 хүртэл)</label>
      <label class="image-picker" id="imagePicker" for="imageInput">
        <div class="image-picker-icon">📷</div>
        <div class="image-picker-text">Зураг сонгох эсвэл шинээр авах</div>
      </label>
      <input type="file" id="imageInput" accept="image/*" capture="environment" multiple onchange="onImagesPicked()">
      <div class="preview-strip" id="previewStrip"></div>
    </div>

    <div class="btn-row">
      <button class="modal-cancel" onclick="closeEditor()">Болих</button>
      <button class="modal-save" id="saveBtn" onclick="saveNews()">Нийтлэх</button>
    </div>
  </div>
</div>

<!-- Image viewer -->
<div class="viewer-overlay" id="viewer" onclick="closeViewer(event)">
  <button class="viewer-close" onclick="closeViewer()">✕</button>
  <img id="viewerImg" src="">
</div>

<script src="/js/bottom-nav.js"></script>
<script>
const token = localStorage.getItem('token');
const user  = JSON.parse(localStorage.getItem('user') || '{}');
if (!token) window.location.href = '/';

const isAdmin = user.role === 'admin';
if (isAdmin) document.getElementById('fabBtn').style.display = '';

async function api(path, opts = {}) {
  const r = await fetch('/api' + path, {
    ...opts,
    headers: { 'Authorization': 'Bearer ' + token, ...(opts.headers||{}) }
  });
  if (r.status === 401) { localStorage.clear(); window.location.href = '/'; }
  return r.json();
}

function fmt(n) { return Number(n||0).toLocaleString('mn-MN'); }
function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const today = new Date();
  const diff = (today - d) / 1000;
  if (diff < 60) return 'дөнгөж сая';
  if (diff < 3600) return Math.floor(diff/60) + ' минутын өмнө';
  if (diff < 86400) return Math.floor(diff/3600) + ' цагийн өмнө';
  if (diff < 86400 * 7) return Math.floor(diff/86400) + ' өдрийн өмнө';
  return d.toISOString().slice(0,10);
}

let allNews = [];

async function load() {
  allNews = await api('/news') || [];
  render();
}

function render() {
  const el = document.getElementById('newsList');
  if (!allNews.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="icon">📭</div>
        <h2>Мэдээ хараахан байхгүй</h2>
        <p>Энэ хэсэгт компанийн дотоод мэдээ, зарлал, шинэчлэл гарна.${isAdmin ? ' Нэмэхдээ доорх + товч даран нэмнэ үү.' : ''}</p>
      </div>`;
    return;
  }

  el.innerHTML = allNews.map(n => renderCard(n)).join('');
}

const PRIO_LABEL = { urgent: '🔴 ЯАРАЛТАЙ', important: '🟠 ЧУХАЛ', normal: '⚪ ЭНГИЙН' };

function renderCard(n) {
  const imgs = n.images || [];
  let imgHtml = '';
  if (imgs.length) {
    const cls = imgs.length === 1 ? 'single' : imgs.length === 2 ? 'dbl' : 'tri';
    imgHtml = `<div class="news-images ${cls}">` +
      imgs.slice(0,3).map((u, i) => `<img src="${u}" onclick="openViewer('${u}')" loading="lazy" alt="">`).join('') +
      `</div>`;
  }

  const adminActions = isAdmin ? `
    <div class="news-actions">
      <button class="news-action-btn danger" onclick="deleteNews('${n.id}')">Устгах</button>
    </div>` : '';

  return `
    <div class="news-card ${n.priority || 'normal'}">
      ${imgHtml}
      <div class="news-body">
        <div class="news-header">
          <div class="news-title">${escapeHtml(n.title)}</div>
          <span class="priority-tag ${n.priority || 'normal'}">${PRIO_LABEL[n.priority] || 'ЭНГИЙН'}</span>
        </div>
        ${n.body ? `<div class="news-text">${escapeHtml(n.body)}</div>` : ''}
        <div class="news-meta">
          <span>${escapeHtml(n.created_by || '')} · ${formatDate(n.created_at)}</span>
          ${adminActions}
        </div>
      </div>
    </div>`;
}

// ── Editor ──
let pickedFiles = [];
let editorPriority = 'normal';

function openEditor() {
  document.getElementById('ed-title').value = '';
  document.getElementById('ed-body').value = '';
  pickedFiles = [];
  editorPriority = 'normal';
  setPriority('normal');
  renderPreviews();
  document.getElementById('editorModal').classList.add('open');
}

function closeEditor() {
  document.getElementById('editorModal').classList.remove('open');
  pickedFiles = [];
  document.getElementById('imageInput').value = '';
  document.getElementById('imagePicker').classList.remove('has-files');
}

function closeEditorIfBackdrop(e) {
  if (e.target === document.getElementById('editorModal')) closeEditor();
}

function setPriority(p) {
  editorPriority = p;
  document.querySelectorAll('.priority-opt').forEach(b => {
    b.classList.toggle('active', b.dataset.prio === p);
  });
}

function onImagesPicked() {
  const files = Array.from(document.getElementById('imageInput').files || []);
  pickedFiles = files.slice(0, 3); // max 3
  if (pickedFiles.length > 0) {
    document.getElementById('imagePicker').classList.add('has-files');
  }
  renderPreviews();
}

function renderPreviews() {
  const el = document.getElementById('previewStrip');
  if (!pickedFiles.length) { el.innerHTML = ''; return; }
  el.innerHTML = pickedFiles.map((f, i) => {
    const url = URL.createObjectURL(f);
    return `<div class="preview-item" style="background-image:url('${url}')">
      <button class="preview-remove" onclick="removePreview(${i})">✕</button>
    </div>`;
  }).join('');
}

function removePreview(idx) {
  pickedFiles.splice(idx, 1);
  renderPreviews();
  if (!pickedFiles.length) document.getElementById('imagePicker').classList.remove('has-files');
}

async function saveNews() {
  const title = document.getElementById('ed-title').value.trim();
  if (!title) { alert('Гарчиг оруулна уу'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '⏳ Илгээж байна...';

  const fd = new FormData();
  fd.append('title', title);
  fd.append('body', document.getElementById('ed-body').value);
  fd.append('priority', editorPriority);
  pickedFiles.forEach(f => fd.append('images', f));

  try {
    const r = await fetch('/api/news', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      body: fd,
    });
    const data = await r.json();
    if (!r.ok || !data.ok) throw new Error(data.error || 'Алдаа');

    closeEditor();
    await load();
  } catch (e) {
    alert('Алдаа: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Нийтлэх';
  }
}

async function deleteNews(id) {
  if (!confirm('Энэ мэдээг устгах уу?')) return;
  const r = await api('/news/' + id, { method: 'DELETE' });
  if (r.ok) await load();
  else alert('Алдаа: ' + (r.error || 'Тодорхойгүй'));
}

// ── Image viewer ──
function openViewer(url) {
  document.getElementById('viewerImg').src = url;
  document.getElementById('viewer').classList.add('open');
}
function closeViewer(e) {
  if (!e || e.target.id === 'viewer' || e.currentTarget.classList.contains('viewer-close')) {
    document.getElementById('viewer').classList.remove('open');
  }
}

// ── Auto-refresh on page show ──
window.addEventListener('pageshow', (e) => {
  if (e.persisted || document.visibilityState === 'visible') load();
});

load();
</script>
</body>
</html>
