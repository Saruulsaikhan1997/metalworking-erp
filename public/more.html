<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>Бусад — Метал ворkинг Центр</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background: #f4f6f8; color: #1a1a2e; min-height: 100vh; }

.header {
  background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
  color: #fff; padding: 18px 20px;
  border-radius: 0 0 18px 18px;
}
.header h1 { font-size: 16px; font-weight: 700; }
.header .sub { font-size: 11px; opacity: 0.8; margin-top: 4px; }

.section { padding: 18px 14px 0; }
.section-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; padding: 0 4px; }

.menu-list { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.05); margin-bottom: 10px; }
.menu-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px; text-decoration: none; color: #1a1a2e;
  border-bottom: 1px solid #f0f0f0;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:active { background: #f5f5f5; }
.menu-item .mi-icon { font-size: 22px; width: 30px; text-align: center; }
.menu-item .mi-text { flex: 1; }
.menu-item .mi-title { font-size: 13px; font-weight: 600; }
.menu-item .mi-sub { font-size: 10px; color: #888; margin-top: 1px; }
.menu-item .mi-arrow { color: #ccc; font-size: 16px; }

.logout-section { padding: 18px 14px 0; }
.logout-btn-full {
  width: 100%; padding: 14px;
  background: #fff; border: 1px solid #e0e0e0;
  border-radius: 14px; color: #c62828; font-size: 13px;
  font-weight: 600; cursor: pointer;
}
.logout-btn-full:active { background: #ffebee; }
</style>
</head>
<body>

<div class="header">
  <h1>Бусад</h1>
  <div class="sub" id="userInfo">—</div>
</div>

<div class="section">
  <div class="section-label">Үйл ажиллагаа</div>
  <div class="menu-list">
    <a class="menu-item" href="/production">
      <div class="mi-icon">⚙️</div>
      <div class="mi-text">
        <div class="mi-title">Үйлдвэрлэл</div>
        <div class="mi-sub">Гаралт, бүртгэл</div>
      </div>
      <div class="mi-arrow">›</div>
    </a>
    <a class="menu-item" href="/sales">
      <div class="mi-icon">🛒</div>
      <div class="mi-text">
        <div class="mi-title">Борлуулалт</div>
        <div class="mi-sub">Захиалга бүртгэх</div>
      </div>
      <div class="mi-arrow">›</div>
    </a>
    <a class="menu-item" href="/news">
      <div class="mi-icon">📰</div>
      <div class="mi-text">
        <div class="mi-title">Мэдээ</div>
        <div class="mi-sub">Удахгүй ирэх</div>
      </div>
      <div class="mi-arrow">›</div>
    </a>
  </div>
</div>

<div id="adminMenu" class="section" style="display:none">
  <div class="section-label">Удирдлага</div>
  <div class="menu-list">
    <a class="menu-item" href="/settings">
      <div class="mi-icon">⚙️</div>
      <div class="mi-text">
        <div class="mi-title">Тохиргоо</div>
        <div class="mi-sub">Бүтээгдэхүүн, салбар, данс</div>
      </div>
      <div class="mi-arrow">›</div>
    </a>
  </div>
</div>

<div class="logout-section">
  <button class="logout-btn-full" onclick="logout()">Гарах</button>
</div>

<script src="/js/bottom-nav.js"></script>
<script>
const token = localStorage.getItem('token');
const user  = JSON.parse(localStorage.getItem('user') || '{}');
if (!token) window.location.href = '/';

function roleLabel(r) {
  return { admin: 'Админ', shareholder: 'Хувьцаа эзэмшигч', sales: 'Борлуулагч', warehouse: 'Склад', engineer: 'Инженер', accountant: 'Нягтлан' }[r] || r;
}

document.getElementById('userInfo').textContent = (user.name || '') + ' · ' + roleLabel(user.role);

if (user.role === 'admin') {
  document.getElementById('adminMenu').style.display = '';
}

async function logout() {
  try { await fetch('/api/auth/logout', { method: 'POST' }); } catch(_) {}
  localStorage.clear();
  window.location.href = '/';
}
</script>
</body>
</html>
